# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "41005ee4ea0dade72d57a6c0fd641b45"
name = "Verify COD Orders"
handle = "verify-cod-orders-4"
application_url = "https://rabbit-demand-fragrance-eau.trycloudflare.com"
embedded = true

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # Webhooks de cumplimiento GDPR (ya implementados)
  [[webhooks.subscriptions]]
  topics = [ "customers/data_request" ]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = [ "customers/redact" ]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = [ "shop/redact" ]
  uri = "/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_inventory,read_orders,read_products,write_orders,write_customers,read_customers"

[auth]
redirect_urls = ["https://rabbit-demand-fragrance-eau.trycloudflare.com/auth/callback", "https://rabbit-demand-fragrance-eau.trycloudflare.com/auth/shopify/callback", "https://rabbit-demand-fragrance-eau.trycloudflare.com/api/auth/callback"]

[pos]
embedded = false
